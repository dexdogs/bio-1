<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankur Podder | Bio</title>
    <style>
        body, html { margin: 0; background: #fff; height: 100vh; width: 100vw; overflow: hidden; }
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 1s, transform 1s; }
        .pokedex-hardware { position: relative; width: 800px; height: 800px; max-width: 95vw; max-height: 95vh; background: url("bio-1/pokedex.png") no-repeat center center; background-size: contain; }
        .pokedex-screen-hitbox { position: absolute; top: 69.5%; left: 47%; transform: translate(-50%, -50%); width: 34%; height: 29%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .boot-text { font-family: monospace; font-size: 1.2rem; color: #0f0; text-align: center; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>
<div id="boot-screen">
    <div class="pokedex-hardware">
        <div class="pokedex-screen-hitbox" id="start-btn">
            <div class="boot-text">START<br>[ TAP ]</div>
        </div>
    </div>
</div>
<script>
    document.getElementById("start-btn").addEventListener("click", () => {
        const boot = document.getElementById("boot-screen");
        boot.style.opacity = 0;
        boot.style.transform = "scale(2)";
        setTimeout(() => boot.style.display = "none", 1000);
    });
</script>
</body>
</html>
