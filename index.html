<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankur Podder | Bio</title>
    <style>
        @font-face { font-family: "BPdots"; src: url("bio-1/BPdots.otf") format("opentype"); }
        body, html { margin: 0; background: #fff; height: 100vh; width: 100vw; overflow: hidden; }
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; align-items: center; justify-content: center;  }
        .pokedex-hardware { position: relative; transition: transform 2.4s ease-in; transform-origin: 47% 69.5%; width: 95vmin; height: 95vmin; max-width: 800px; max-height: 800px; background: url("bio-1/pokedex.png") no-repeat center center; background-size: contain; }
        .pokedex-screen-hitbox { position: absolute; top: 69.5%; left: 47%; transform: translate(-50%, -50%); width: 34%; height: 29%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 1001; }
        .boot-text { font-family: "BPdots", monospace; font-size: 1.2rem; color: #fff; text-align: center;  }
        .blink { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>
<div id="boot-screen">
    <div class="pokedex-hardware">
        <div class="pokedex-screen-hitbox" id="start-btn">
            <div class="boot-text">my world<br>[ <span class="blink">enter</span> ]</div>
        </div>
    </div>
</div>
<script>
    document.getElementById("start-btn").addEventListener("click", function() {
        this.style.background = "#fff";
        this.innerHTML = "";
        const hw = document.querySelector(".pokedex-hardware");
        hw.style.transform = "scale(50)";
        setTimeout(() => {
            document.getElementById("boot-screen").style.display = "none";
        }, 2400);
    });
</script>
</body>
</html>
