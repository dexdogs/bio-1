<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankur Podder | Bio v2.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @font-face { font-family: 'BPdots'; src: url('./BPdots.otf'); }
        :root { 
            --grass: #5ac54f; --grass-dark: #40a035; --path: #debb7b; --path-border: #b89056; 
            --tree: #2d7a22; --tree-dark: #1b5212; --ui-bg: #121212;
            --water: #3b82f6; --water-light: #60a5fa; --sand: #e6c280; --trunk: #8b5a2b;
        }
        body, html { margin: 0; background: #000; overflow-x: hidden; font-family: 'BPdots', monospace; color: #fff; }
        
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.5s; }
        .pokedex-box { border: 4px solid #fff; padding: 2rem; background: var(--ui-bg); text-align: center; }
        
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: var(--grass); overflow: hidden; }
        
        #map { position: absolute; bottom: 0; left: 0; width: 100%; height: 500vh; background-image: radial-gradient(var(--grass-dark) 15%, transparent 16%), radial-gradient(var(--grass-dark) 15%, transparent 16%); background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        
        .forest-wall { position: absolute; top: 0; height: 100%; width: 20vw; background-image: radial-gradient(circle, var(--tree) 60%, transparent 60%); background-size: 40px 40px; border-right: 4px solid var(--tree-dark); box-shadow: inset -10px 0 20px rgba(0,0,0,0.3); }
        .forest-wall.right { right: 0; left: auto; border-right: none; border-left: 4px solid var(--tree-dark); box-shadow: inset 10px 0 20px rgba(0,0,0,0.3); }
        
        .route-path { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 140px; height: 100%; background: var(--path); border-left: 6px solid var(--path-border); border-right: 6px solid var(--path-border); }
        
        .poi-building { position: absolute; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: #fff; border: 4px solid #000; border-radius: 8px 8px 0 0; display: flex; align-items: flex-end; justify-content: center; box-shadow: 10px 10px 0 rgba(0,0,0,0.2); z-index: 10; }
        .poi-building::after { content: ''; width: 20px; height: 30px; background: #000; display: block; }
        .poi-sign { position: absolute; left: calc(50% + 90px); width: 100px; padding: 5px; background: #fff; color: #000; border: 2px solid #000; font-size: 0.8rem; text-align: center; margin-top: 20px; z-index: 10; }

        #cp-0 { bottom: 20vh; } #cp-1 { bottom: 120vh; } #cp-2 { bottom: 220vh; } #cp-3 { bottom: 320vh; }
        
        /* --- CUSTOM CSS ENVIRONMENT: ISLAND & TREE --- */
        .island-container {
            position: absolute;
            left: calc(50% - 280px); /* Positioned to the left of the path */
            bottom: 20vh;            /* Aligned with CP-0 */
            width: 180px;
            height: 140px;
            z-index: 5;
        }

        /* Animated Water Body */
        .water {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--water);
            border: 4px solid var(--water-light);
            /* Creating an organic, changing shape for waves */
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: waves 4s ease-in-out infinite alternate;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes waves {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: scale(1); }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: scale(1.05); }
        }

        /* The Sand Island */
        .island {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90px; height: 70px;
            background: var(--sand);
            border-radius: 50%;
            border: 2px solid #c29f60;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1);
        }

        /* CSS Art Tree */
        .tree {
            position: absolute;
            top: -30px;
            left: 20px;
        }

        .trunk {
            width: 14px; height: 40px;
            background: var(--trunk);
            border: 2px solid #5c3a18;
            margin: 0 auto;
            border-radius: 2px;
        }

        .leaves {
            width: 60px; height: 60px;
            background: var(--tree);
            border: 2px solid var(--tree-dark);
            border-radius: 50%;
            position: absolute;
            top: -40px; left: -23px;
            /* Rustling animation */
            animation: rustle 2.5s ease-in-out infinite alternate;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.2);
        }

        @keyframes rustle {
            0% { transform: rotate(-8deg); }
            100% { transform: rotate(8deg); }
        }
        /* ------------------------------------------- */

        #player { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 26px; height: 34px; background: #e63946; border: 2px solid #000; border-radius: 12px 12px 0 0; z-index: 50; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        #player::after { content: ''; display: block; width: 16px; height: 16px; background: #ffcdb2; border-radius: 50%; margin: 4px auto; }
        
        #dialog-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; height: 120px; background: #fff; color: #000; border: 6px solid #000; border-radius: 8px; padding: 1rem; display: none; z-index: 60; box-sizing: border-box; }
        #scroll-proxy { height: 500vh; width: 100%; position: absolute; top: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

<div id="boot-screen" onclick="startGame()">
    <div class="pokedex-box">
        <h2>DEXDOGS_OS v2.2</h2>
        <p>[ CLICK TO INITIALIZE WORLD ]</p>
    </div>
</div>

<div id="game-container">
    <div id="map">
        <div class="forest-wall"></div>
        <div class="forest-wall right"></div>
        
        <div class="island-container">
            <div class="water"></div>
            <div class="island">
                <div class="tree">
                    <div class="leaves"></div>
                    <div class="trunk"></div>
                </div>
            </div>
        </div>
        
        <div class="route-path"></div>
        
        <div class="poi-building" id="cp-0"><div class="poi-sign">00-10</div></div>
        <div class="poi-building" id="cp-1"><div class="poi-sign">11-20</div></div>
        <div class="poi-building" id="cp-2"><div class="poi-sign">21-30</div></div>
        <div class="poi-building" id="cp-3"><div class="poi-sign">31-40</div></div>
    </div>
    <div id="player"></div>
    <div id="dialog-box"><div id="dialog-text">...</div></div>
</div>

<div id="scroll-proxy"></div>

<script>
    gsap.registerPlugin(ScrollTrigger);

    const dialogs = [
        "Foundational years. Early curiosity in environmental systems.",
        "Academic foundations at MIT. Initial technical engineering.",
        "Research Scientist tenure. Deep focus on carbon markets at NREL.",
        "Founder era. Launching dexdogs to fix environmental data."
    ];

    function startGame() {
        document.getElementById('boot-screen').style.opacity = 0;
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initScroll();
        }, 500);
    }

    function initScroll() {
        gsap.to("#map", {
            y: "400vh", ease: "none",
            scrollTrigger: { trigger: "#scroll-proxy", start: "top top", end: "bottom bottom", scrub: true }
        });

        [20, 120, 220, 320].forEach((pos, index) => {
            ScrollTrigger.create({
                trigger: "#scroll-proxy", start: `${pos - 10}vh center`, end: `${pos + 10}vh center`,
                onEnter: () => showDialog(index), onEnterBack: () => showDialog(index),
                onLeave: hideDialog, onLeaveBack: hideDialog
            });
        });
    }

    function showDialog(index) {
        document.getElementById('dialog-text').innerText = dialogs[index];
        document.getElementById('dialog-box').style.display = 'block';
    }
    function hideDialog() { document.getElementById('dialog-box').style.display = 'none'; }
</script>
</body>
</html>
