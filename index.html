<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankur Podder | Bio v3.4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @font-face { font-family: 'BPdots'; src: url('./BPdots.otf'); }
        :root { 
            --path: rgba(222, 187, 123, 0.7);
            --path-border: #b89056;
            --ui-bg: #121212;
        }
        body, html { margin: 0; background: #000; overflow-x: hidden; font-family: 'BPdots', monospace; color: #fff; }
        
        /* --- POKEDEX LANDING BOOT --- */
        #boot-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 100; 
            display: flex; align-items: center; justify-content: center; 
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
        }
        .pokedex-hardware {
            position: relative;
            width: 90vmin; height: 90vmin;
            background: url('pokedex.jpg') no-repeat center center;
            background-size: contain;
            display: flex; align-items: center; justify-content: center;
        }
        /* Screen Area Positioning (Calculated based on pokedex.jpg layout) */
        .pokedex-screen-hitbox {
            position: absolute;
            top: 55%; left: 47%;
            transform: translate(-50%, -50%);
            width: 32%; height: 25%;
            background: rgba(0,255,0,0.05); /* Nearly invisible green tint */
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .boot-text {
            font-size: 0.8rem; color: #0f0; text-shadow: 0 0 5px #0f0;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* --- THE UNDERLAY (ROOTS IMAGE) --- */
        #roots-bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: url('roots-background.png') no-repeat center center;
            background-size: cover; z-index: 1;
        }

        /* --- GAME OVERWORLD --- */
        #game-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 10; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 500vh; }
        .route-path { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            width: 140px; height: 100%; background: var(--path); 
            border-left: 6px solid var(--path-border); border-right: 6px solid var(--path-border);
        }
        .start-house { position: absolute; top: 5vh; left: 50%; transform: translateX(-50%); width: 120px; height: 100px; background: #fff; border: 6px solid #000; z-index: 15; }
        .door { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 30px; height: 40px; background: #000; }
        .poi-sign { position: absolute; left: calc(50% + 90px); width: 120px; padding: 8px; background: #fff; color: #000; border: 3px solid #000; font-size: 0.9rem; text-align: center; }
        #cp-0 { top: 20vh; position: absolute; left: 50%; transform: translateX(-50%); }

        #player { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 28px; height: 36px; background: #ef4444; border: 3px solid #000; border-radius: 14px 14px 0 0; z-index: 50; }
        #player::after { content: ''; display: block; width: 18px; height: 18px; background: #fee2e2; border-radius: 50%; margin: 4px auto; }
        
        #dialog-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; height: 120px; background: #fff; color: #000; border: 6px solid #000; padding: 1rem; display: none; z-index: 60; box-sizing: border-box; }
        #scroll-proxy { height: 500vh; width: 100%; position: absolute; top: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="boot-screen">
    <div class="pokedex-hardware">
        <div class="pokedex-screen-hitbox" onclick="startGame()">
            <div class="boot-text">DEXDOGS_OS<br>v3.4<br><br>[ CLICK TO BOOT ]</div>
        </div>
    </div>
</div>

<div id="roots-bg-layer"></div>

<div id="game-container">
    <div id="map">
        <div class="route-path"></div>
        <div class="start-house"><div class="door"></div></div>
        <div id="cp-0"><div class="poi-sign">00-10: ROOTS</div></div>
    </div>
    <div id="player"></div>
    <div id="dialog-box"><div id="dialog-text">...</div></div>
</div>

<div id="scroll-proxy"></div>

<script>
    gsap.registerPlugin(ScrollTrigger);

    function startGame() {
        const boot = document.getElementById('boot-screen');
        boot.style.opacity = 0;
        boot.style.transform = "scale(1.2)";
        
        setTimeout(() => {
            boot.style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initScroll();
        }, 1000);
    }

    function initScroll() {
        gsap.to("#map", {
            y: "-400vh", ease: "none",
            scrollTrigger: { trigger: "#scroll-proxy", start: "top top", end: "bottom bottom", scrub: true }
        });

        gsap.to("#roots-bg-layer", {
            opacity: 0,
            scrollTrigger: { trigger: "#scroll-proxy", start: "15% top", end: "30% top", scrub: true }
        });

        ScrollTrigger.create({
            trigger: "#scroll-proxy", start: "0% top", end: "25% top",
            onEnter: () => showDialog(0), onEnterBack: () => showDialog(0),
            onLeave: hideDialog, onLeaveBack: hideDialog
        });
    }

    function showDialog(index) {
        const texts = ["You've stepped out into the world. Early curiosity in environmental systems begins here."];
        document.getElementById('dialog-text').innerText = texts[index];
        document.getElementById('dialog-box').style.display = 'block';
    }
    function hideDialog() { document.getElementById('dialog-box').style.display = 'none'; }
</script>
</body>
</html>
